version: "3.9"

services:
  # PostgreSQL with pgvector + Apache AGE
  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: quill
      POSTGRES_USER: quill
      POSTGRES_PASSWORD: ${DB_PASSWORD:-quill_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-extensions.sh:/docker-entrypoint-initdb.d/01-init-extensions.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quill"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Database migrations
  migrations:
    image: postgres:16
    volumes:
      - ./backend/migrations:/migrations:ro
      - ./backend/scripts/run-migrations.sh:/run-migrations.sh:ro
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: quill
      DB_PASSWORD: ${DB_PASSWORD:-quill_dev_password}
      DB_NAME: quill
    entrypoint: ["/bin/sh", "/run-migrations.sh"]
    depends_on:
      postgres:
        condition: service_healthy

  # Go Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://quill:${DB_PASSWORD:-quill_dev_password}@postgres:5432/quill?sslmode=disable
      QWEN_API_KEY: ${QWEN_API_KEY}
      LLM_PROTOCOL: ${LLM_PROTOCOL:-openai}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      QWEN_NATIVE_BASE_URL: ${QWEN_NATIVE_BASE_URL:-https://dashscope-intl.aliyuncs.com}
      QWEN_EXTRACTION_MODEL: ${QWEN_EXTRACTION_MODEL:-qwen-turbo}
      QWEN_REASONING_MODEL: ${QWEN_REASONING_MODEL:-qwen-max}
      QWEN_CRAFT_MODEL: ${QWEN_CRAFT_MODEL:-qwen-max}
      SKILL_DIR: ${SKILL_DIR:-/app/skills}
      QWEN_FALLBACK_MODEL: ${QWEN_FALLBACK_MODEL:-qwen-plus}
      QWEN_FALLBACK_ON_429: ${QWEN_FALLBACK_ON_429:-false}
      QWEN_RERANK_MODEL: ${QWEN_RERANK_MODEL:-qwen3-rerank}
      QWEN_EMBEDDING_MODEL: ${QWEN_EMBEDDING_MODEL:-text-embedding-v4}
      LLM_TPM_TURBO: "${LLM_TPM_TURBO:-5000000}"
      LLM_TPM_MAX: "${LLM_TPM_MAX:-1000000}"
      LLM_RPM: "${LLM_RPM:-600}"
      LLM_INTERACTIVE_RESERVE: "${LLM_INTERACTIVE_RESERVE:-0.30}"
      LLM_MAX_CONCURRENCY: "${LLM_MAX_CONCURRENCY:-5}"
      LLM_RAMP_STEP: "${LLM_RAMP_STEP:-1}"
      QWEN_RETRY_MAX_ATTEMPTS: "${QWEN_RETRY_MAX_ATTEMPTS:-3}"
      QWEN_API_TIMEOUT_SECONDS: ${QWEN_API_TIMEOUT_SECONDS:-120}
      QWEN_EMBEDDING_DIMENSIONS: "${QWEN_EMBEDDING_DIMENSIONS:-1024}"
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      PORT: "8080"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${FRONTEND_URL:-http://localhost:3000}
      MAX_UPLOAD_SIZE_MB: "100"
      INGEST_ANALYSIS_MAX_CHAPTERS: "${INGEST_ANALYSIS_MAX_CHAPTERS:-8}"
      WRITER_PREFERENCE_PROMOTION_THRESHOLD: "${WRITER_PREFERENCE_PROMOTION_THRESHOLD:-3}"
      CONTRADICTION_AGENT_DEPTH: "${CONTRADICTION_AGENT_DEPTH:-3}"
      PLOT_HOLE_AGENT_DEPTH: "${PLOT_HOLE_AGENT_DEPTH:-2}"
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./backend/skills:/app/skills:ro
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:

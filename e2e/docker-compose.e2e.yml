# Compose override for `make e2e`. The base compose file remains the normal
# developer stack; this file gives the disposable E2E project independent host
# ports, so it can run while that stack is already up.
services:
  postgres:
    ports: !override
      - "127.0.0.1:15432:5432"

  backend:
    ports: !override
      - "127.0.0.1:18080:8080"
    environment:
      FRONTEND_URL: http://127.0.0.1:13001
      ALLOWED_ORIGINS: http://127.0.0.1:13001

  frontend:
    ports: !override
      - "127.0.0.1:13001:3000"

  # A first-party binary image, not a generic Go shell with the workspace
  # mounted. The only host bind is the report output directory; .env is
  # excluded from the build context by the root .dockerignore.
  ingestion-perf:
    profiles: ["perf"]
    build:
      context: .
      dockerfile: backend/Dockerfile.perf
    environment:
      DATABASE_URL: postgres://quill:${DB_PASSWORD:-quill_dev_password}@postgres:5432/quill?sslmode=disable
      QWEN_API_KEY: ${QWEN_API_KEY:?QWEN_API_KEY is required for live ingestion performance}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      QWEN_EXTRACTION_MODEL: ${QWEN_EXTRACTION_MODEL:-qwen-turbo}
      QWEN_REASONING_MODEL: ${QWEN_REASONING_MODEL:-qwen-max}
      QWEN_EMBEDDING_MODEL: ${QWEN_EMBEDDING_MODEL:-text-embedding-v4}
      QWEN_EMBEDDING_DIMENSIONS: ${QWEN_EMBEDDING_DIMENSIONS:-1024}
      LLM_TPM_TURBO: ${LLM_TPM_TURBO:-5000000}
      LLM_TPM_MAX: ${LLM_TPM_MAX:-1000000}
      LLM_RPM: ${LLM_RPM:-600}
      LLM_INTERACTIVE_RESERVE: ${LLM_INTERACTIVE_RESERVE:-0.30}
      LLM_MAX_CONCURRENCY: ${LLM_MAX_CONCURRENCY:-5}
      LLM_RAMP_STEP: ${LLM_RAMP_STEP:-1}
      QWEN_RETRY_MAX_ATTEMPTS: ${QWEN_RETRY_MAX_ATTEMPTS:-3}
      QWEN_API_TIMEOUT_SECONDS: ${QWEN_API_TIMEOUT_SECONDS:-120}
      QWEN_HEALTH_TIMEOUT_SECONDS: ${QWEN_HEALTH_TIMEOUT_SECONDS:-5}
    volumes:
      - ./artifacts/reports:/reports
    command:
      - -pages
      - ${INGESTION_PERF_PAGES:-50}
      - -runs
      - ${INGESTION_PERF_RUNS:-1}
      - -fixture
      - /fixtures/ingestion-${INGESTION_PERF_PAGES:-50}-page.md
      - -output
      - /reports/ingestion-live-${INGESTION_PERF_PAGES:-50}-page.json
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    restart: "no"
